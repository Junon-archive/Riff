<!--
  Riff — 무료 기타 레슨 웹서비스 (디자인 레퍼런스 목업)
  ------------------------------------------------------------
  · 디자인 톤: TOSS (흰색/파랑, 미니멀, 넓은 여백, 큰 라운드, 친절한 대화체)
  · 모바일 우선 + PC 지원(중앙 앱 컬럼)
  · 로그인 없음: 닉네임 + localStorage 진도 (try/catch로 인메모리 폴백)
  · 3개국어(KR/EN/JP) i18n 스위처 상시 노출
  · 지판/타브는 이미지가 아니라 JSON 데이터 → SVG 렌더 (currentColor 기반 = 다크모드 자동 대응)
  · 순수 프론트엔드, 외부 CDN 의존 없음(시스템 폰트 스택)
  ------------------------------------------------------------
  실제 렌더러(Fretboard/Tab)가 들어갈 자리는 정확한 형태의 SVG placeholder로 잡아둠.
-->
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Riff · 무료 기타 레슨 (디자인 목업)</title>
<style>
  /* ============================================================
     디자인 토큰 — Toss 팔레트
     ============================================================ */
  :root {
    --blue-50:  #E8F3FF;
    --blue-100: #C9E2FF;
    --blue-500: #3182F6;   /* Toss 시그니처 블루 */
    --blue-600: #2272EB;
    --blue-700: #1B64DA;

    --grey-900: #191F28;
    --grey-800: #333D4B;
    --grey-700: #4E5968;
    --grey-600: #6B7684;
    --grey-500: #8B95A1;
    --grey-400: #B0B8C1;
    --grey-300: #D1D6DB;
    --grey-200: #E5E8EB;
    --grey-100: #F2F4F6;
    --grey-50:  #F9FAFB;

    --green-500: #12B886;
    --yellow-500: #FFC043;

    /* 의미 토큰(라이트) */
    --bg:        #FFFFFF;
    --bg-sub:    #F2F4F6;   /* 앱 밖 배경(데스크톱 프레임) */
    --card:      #FFFFFF;
    --card-sub:  #F9FAFB;
    --line:      #E5E8EB;
    --text:      #191F28;
    --text-2:    #4E5968;
    --text-3:    #8B95A1;
    --primary:   #3182F6;
    --primary-press: #1B64DA;
    --primary-weak:  #E8F3FF;
    --shadow:    0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.05), 0 2px 8px rgba(0,0,0,.04);

    --radius-lg: 24px;
    --radius:    20px;
    --radius-sm: 14px;
    --pill:      999px;

    --app-w: 480px;
    --safe-b: env(safe-area-inset-bottom, 0px);

    --font: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
            "Pretendard", "Malgun Gothic", "Segoe UI",
            "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP",
            "Noto Sans KR", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  [data-theme="dark"] {
    --bg:        #17171C;
    --bg-sub:    #0E0E12;
    --card:      #1E1E24;
    --card-sub:  #26262E;
    --line:      #2E2E38;
    --text:      #EDEEF0;
    --text-2:    #B0B8C1;
    --text-3:    #7C838D;
    --primary:   #4593FC;
    --primary-press: #3182F6;
    --primary-weak:  #17263D;
    --shadow:    0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.5);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4), 0 2px 8px rgba(0,0,0,.35);
    --grey-100:  #26262E;
    --grey-50:   #1E1E24;
    --grey-200:  #2E2E38;
  }

  /* ============================================================
     리셋 & 기본
     ============================================================ */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg-sub);
    color: var(--text);
    line-height: 1.5;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    transition: background .25s ease, color .25s ease;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; transition-duration: .01ms !important; }
  }

  /* ============================================================
     앱 셸 — 데스크톱에선 중앙 앱 컬럼
     ============================================================ */
  .app {
    position: relative;
    max-width: var(--app-w);
    min-height: 100vh;
    margin: 0 auto;
    background: var(--bg);
    transition: background .25s ease;
  }
  @media (min-width: 600px) {
    .app {
      min-height: calc(100vh - 48px);
      margin: 24px auto;
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
  }

  /* ---- 헤더 ---- */
  .topbar {
    position: sticky; top: 0; z-index: 40;
    display: flex; align-items: center; gap: 8px;
    height: 56px; padding: 0 8px 0 6px;
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid transparent;
  }
  .topbar.scrolled { border-bottom-color: var(--line); }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 12px;
    display: grid; place-items: center; color: var(--text);
    transition: background .15s;
  }
  .icon-btn:active { background: var(--grey-100); }
  .brand {
    display: flex; align-items: center; gap: 8px;
    font-weight: 800; font-size: 19px; letter-spacing: -0.03em;
  }
  .brand .pick {
    width: 22px; height: 22px; color: var(--primary);
  }
  .topbar .spacer { flex: 1; }

  /* 언어 스위처 (세그먼트) */
  .lang-seg {
    display: inline-flex; background: var(--grey-100);
    border-radius: var(--pill); padding: 3px;
  }
  .lang-seg button {
    font-size: 12px; font-weight: 700; color: var(--text-3);
    padding: 5px 9px; border-radius: var(--pill); line-height: 1;
    transition: all .15s;
  }
  .lang-seg button.active {
    background: var(--bg); color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  [data-theme="dark"] .lang-seg button.active { background: #3A3A44; }

  .nick-chip {
    display: inline-flex; align-items: center; gap: 6px;
    max-width: 108px; padding: 7px 12px; border-radius: var(--pill);
    background: var(--primary-weak); color: var(--primary);
    font-size: 13px; font-weight: 700;
  }
  .nick-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---- 뷰 컨테이너 ---- */
  .view { padding: 8px 20px 120px; }
  .view[hidden] { display: none; }

  /* ============================================================
     타이포 & 공통
     ============================================================ */
  .eyebrow { font-size: 13px; font-weight: 700; color: var(--primary); letter-spacing: 0; }
  h1.display {
    font-size: 30px; font-weight: 800; letter-spacing: -0.035em;
    line-height: 1.28; margin: 10px 0 0;
  }
  .lead { font-size: 16px; color: var(--text-2); margin: 12px 0 0; font-weight: 500; }
  .section-title { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; margin: 0; }
  .muted { color: var(--text-3); }

  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px;
    transition: transform .12s ease, box-shadow .15s ease, background .25s;
  }
  .card.tap { cursor: pointer; }
  .card.tap:active { transform: scale(.985); }

  /* 큰 파랑 버튼 (Toss 스타일 CTA) */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; height: 56px; border-radius: var(--radius-sm);
    background: var(--primary); color: #fff;
    font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
    transition: transform .1s, background .15s, opacity .15s;
  }
  .btn:active { transform: scale(.98); background: var(--primary-press); }
  .btn.secondary { background: var(--grey-100); color: var(--text); }
  .btn.ghost { background: transparent; color: var(--text-2); height: 48px; }
  .btn:disabled { opacity: .5; cursor: default; }

  /* 진도 바 */
  .pbar { height: 8px; border-radius: var(--pill); background: var(--grey-200); overflow: hidden; }
  .pbar > i { display: block; height: 100%; background: var(--primary); border-radius: var(--pill);
    transition: width .6s cubic-bezier(.2,.8,.2,1); }

  .row { display: flex; align-items: center; }
  .between { justify-content: space-between; }
  .gap8 { gap: 8px; } .gap12 { gap: 12px; }

  /* ============================================================
     랜딩
     ============================================================ */
  .hero { padding: 24px 4px 8px; }
  .free-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--primary-weak); color: var(--primary);
    font-size: 13px; font-weight: 800; padding: 8px 14px; border-radius: var(--pill);
  }
  .hero h1 .accent { color: var(--primary); }

  .curr-card { margin-top: 16px; overflow: hidden; padding: 0; }
  .curr-thumb {
    height: 132px; display: flex; align-items: flex-end; padding: 16px;
    background:
      radial-gradient(120% 120% at 100% 0%, rgba(255,255,255,.28), transparent 60%),
      linear-gradient(135deg, #4593FC 0%, #3182F6 55%, #1B64DA 100%);
    color: #fff;
  }
  .chip {
    display: inline-block; font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,.22); padding: 5px 10px; border-radius: var(--pill);
    backdrop-filter: blur(4px);
  }
  .curr-body { padding: 18px 20px 20px; }
  .curr-body h3 { margin: 0; font-size: 19px; font-weight: 800; letter-spacing: -0.03em; }
  .curr-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .meta-pill {
    font-size: 12px; font-weight: 600; color: var(--text-2);
    background: var(--grey-100); padding: 5px 10px; border-radius: var(--pill);
  }

  .teaser {
    margin-top: 16px; border-style: dashed; background: var(--card-sub);
    display: flex; align-items: center; gap: 14px;
  }
  .teaser .emoji { font-size: 26px; }
  .teaser h3 { margin: 0; font-size: 16px; font-weight: 800; }
  .teaser p { margin: 3px 0 0; font-size: 13px; color: var(--text-3); }

  .philosophy {
    margin-top: 28px; text-align: center; padding: 28px 16px;
  }
  .philosophy p { font-size: 15px; color: var(--text-2); font-weight: 500; margin: 0; }
  .philosophy strong { color: var(--text); font-weight: 800; }

  /* 저장 안내 배너 */
  .storage-note {
    margin-top: 16px; display: flex; gap: 12px; align-items: flex-start;
    background: var(--card-sub); border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 14px 16px;
  }
  .storage-note .emoji { font-size: 20px; line-height: 1.4; }
  .storage-note p { margin: 0; font-size: 13px; color: var(--text-2); }
  .storage-note button {
    margin-top: 8px; font-size: 13px; font-weight: 700; color: var(--primary);
  }

  /* ============================================================
     커리큘럼 계층(아코디언 트리)
     ============================================================ */
  .curr-head { padding: 20px 4px 4px; }
  .prog-summary {
    margin-top: 16px; padding: 18px 20px; background: var(--primary-weak);
    border-radius: var(--radius); border: none;
  }
  .prog-summary .big { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -0.03em; }

  .month { margin-top: 14px; }
  .month-head {
    width: 100%; display: flex; align-items: center; gap: 12px;
    padding: 18px 20px; background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); text-align: left; transition: background .15s;
  }
  .month.open .month-head { border-radius: var(--radius) var(--radius) 0 0; }
  .month-head:active { background: var(--grey-50); }
  .month-num {
    width: 38px; height: 38px; flex: none; border-radius: 12px;
    background: var(--primary-weak); color: var(--primary);
    display: grid; place-items: center; font-weight: 800; font-size: 14px;
  }
  .month.done .month-num { background: var(--green-500); color: #fff; }
  .month-head .t { flex: 1; min-width: 0; }
  .month-head .t b { display: block; font-size: 16px; font-weight: 800; letter-spacing: -0.02em; }
  .month-head .t small { color: var(--text-3); font-size: 13px; font-weight: 500; }
  .caret { color: var(--text-3); transition: transform .25s; flex: none; }
  .month.open .caret { transform: rotate(180deg); }

  .month-body {
    display: none; border: 1px solid var(--line); border-top: none;
    border-radius: 0 0 var(--radius) var(--radius); overflow: hidden;
    background: var(--card-sub);
  }
  .month.open .month-body { display: block; }
  .month.soon .month-head { opacity: .62; }

  .week { padding: 6px 12px 12px; }
  .week-label {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 8px 8px; font-size: 13px; font-weight: 800; color: var(--text-2);
  }
  .week-label .wp { height: 6px; flex: 1; }

  .day {
    width: 100%; display: flex; align-items: center; gap: 12px;
    padding: 13px 12px; border-radius: 14px; text-align: left;
    background: var(--card); border: 1px solid var(--line); margin-top: 6px;
    transition: transform .1s, background .15s;
  }
  .day:active { transform: scale(.99); background: var(--grey-50); }
  .day .check {
    width: 26px; height: 26px; flex: none; border-radius: 50%;
    border: 2px solid var(--grey-300); display: grid; place-items: center;
    color: transparent; transition: all .2s;
  }
  .day.done .check { background: var(--green-500); border-color: var(--green-500); color: #fff; }
  .day .dt { flex: 1; min-width: 0; }
  .day .dt b { display: block; font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
  .day .dt small { color: var(--text-3); font-size: 12.5px; }
  .day .arr { color: var(--grey-400); flex: none; }
  .day.locked { opacity: .5; }

  /* ============================================================
     레슨 상세(Day)
     ============================================================ */
  .lesson-head { padding: 16px 4px 4px; }
  .crumb { font-size: 13px; font-weight: 700; color: var(--primary); }
  .lesson-head h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.035em; margin: 10px 0 0; }
  .lesson-head .sub { color: var(--text-2); margin: 8px 0 0; font-size: 15px; }

  .block { margin-top: 26px; }
  .block-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 13px; font-weight: 800; color: var(--primary);
    margin-bottom: 12px;
  }
  .block-tag .n {
    width: 22px; height: 22px; border-radius: 7px; font-size: 12px;
    background: var(--primary-weak); display: grid; place-items: center;
  }
  .prose p { font-size: 15.5px; color: var(--text); margin: 0 0 14px; line-height: 1.72; }
  .prose p:last-child { margin-bottom: 0; }
  .callout {
    background: var(--primary-weak); border-radius: var(--radius-sm);
    padding: 16px 18px; font-size: 14.5px; color: var(--text); font-weight: 500;
    display: flex; gap: 10px; margin-top: 4px;
  }
  .callout .emoji { font-size: 18px; }

  /* SVG 렌더 영역 (지판/타브) */
  .render-area {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px 18px; overflow: hidden;
  }
  .render-area + .render-area { margin-top: 12px; }
  .render-cap {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .render-cap b { font-size: 14px; font-weight: 800; }
  .render-cap .badge {
    font-size: 11px; font-weight: 700; color: var(--text-3);
    background: var(--grey-100); padding: 4px 8px; border-radius: var(--pill);
  }
  .render-note { font-size: 12px; color: var(--text-3); margin: 10px 0 0; text-align: center; }
  .fretboard, .tabsvg { width: 100%; height: auto; display: block; color: var(--text); }

  /* 완료 버튼 영역 */
  .complete-wrap { margin-top: 28px; }
  .done-state {
    display: flex; align-items: center; gap: 12px; justify-content: center;
    background: var(--card-sub); border: 1px solid var(--line);
    border-radius: var(--radius-sm); height: 56px; font-weight: 800; color: var(--green-500);
  }

  .lesson-nav { display: flex; gap: 10px; margin-top: 12px; }
  .lesson-nav .btn { height: 50px; font-size: 15px; }

  /* ============================================================
     하단 고정 CTA (도네이션 진입)
     ============================================================ */
  .footer-cta {
    position: sticky; bottom: 0; z-index: 30;
    padding: 12px 20px calc(12px + var(--safe-b));
    background: linear-gradient(to top, var(--bg) 68%, transparent);
  }

  /* ============================================================
     바텀시트 / 모달 공통
     ============================================================ */
  .scrim {
    position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,.42);
    opacity: 0; pointer-events: none; transition: opacity .28s;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .scrim.show { opacity: 1; pointer-events: auto; }
  .sheet {
    width: 100%; max-width: var(--app-w); background: var(--bg);
    border-radius: 28px 28px 0 0; padding: 10px 24px calc(28px + var(--safe-b));
    transform: translateY(100%); transition: transform .34s cubic-bezier(.2,.9,.25,1);
    max-height: 88vh; overflow-y: auto;
  }
  .scrim.show .sheet { transform: translateY(0); }
  .grip { width: 40px; height: 4px; border-radius: 4px; background: var(--grey-300);
    margin: 0 auto 18px; }
  .sheet h2 { font-size: 21px; font-weight: 800; letter-spacing: -0.03em; margin: 0 0 6px; }
  .sheet .sh-sub { color: var(--text-2); font-size: 14.5px; margin: 0 0 20px; }

  /* 도네이션 */
  .save-amount {
    text-align: center; padding: 22px 0 8px;
  }
  .save-amount .big {
    font-size: 22px; font-weight: 800; color: var(--text);
    letter-spacing: -0.03em; line-height: 1.4; word-break: keep-all;
  }
  .save-amount .big b { color: var(--primary); font-size: 30px; }
  .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 18px 0 6px; }
  .pay-btn {
    display: flex; align-items: center; gap: 10px; padding: 15px 16px;
    border: 1px solid var(--line); border-radius: var(--radius-sm);
    background: var(--card); font-weight: 700; font-size: 14.5px; transition: transform .1s, background .15s;
  }
  .pay-btn:active { transform: scale(.98); background: var(--grey-50); }
  .pay-btn .ico { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
    font-size: 15px; color: #fff; flex: none; }
  .pay-toss   .ico { background: #3182F6; }
  .pay-kakao  .ico { background: #FEE500; color: #191F28; }
  .pay-paypal .ico { background: #0070BA; }
  .pay-bmc    .ico { background: #FFDD00; color: #191F28; }
  .close-free { margin-top: 8px; }

  /* 닉네임 입력 */
  .field {
    width: 100%; height: 56px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--line); background: var(--card-sub);
    padding: 0 18px; font-size: 16px; color: var(--text); font-family: inherit;
    transition: border-color .15s, background .15s; margin-bottom: 12px;
  }
  .field:focus { outline: none; border-color: var(--primary); background: var(--bg); }
  .field::placeholder { color: var(--text-3); }

  .io-row { display: flex; gap: 10px; margin-top: 6px; }
  .io-row .btn { height: 52px; font-size: 15px; }
  .io-text {
    width: 100%; height: 120px; resize: none; border-radius: var(--radius-sm);
    border: 1.5px solid var(--line); background: var(--card-sub); color: var(--text);
    padding: 14px 16px; font-size: 13px; font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    margin-top: 12px;
  }

  /* ============================================================
     nudge 토스트
     ============================================================ */
  .toast-wrap {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 70;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 16px calc(16px + var(--safe-b)); pointer-events: none;
  }
  .toast {
    width: 100%; max-width: 440px; pointer-events: auto;
    display: flex; align-items: center; gap: 12px;
    background: var(--grey-900); color: #fff;
    border-radius: 18px; padding: 15px 16px; margin-top: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,.28);
    transform: translateY(140%); opacity: 0;
    transition: transform .4s cubic-bezier(.2,.9,.25,1), opacity .3s;
  }
  [data-theme="dark"] .toast { background: #33343C; }
  .toast.show { transform: translateY(0); opacity: 1; }

const CHORD_EM = {

    {state:0}, {state:2,finger:2}, {state:2,finger:3}, {state:0}, {state:0}, {state:0}

/* ============================================================
   3. SVG 렌더러 (이미지 아님 · JSON → SVG · currentColor)
   ============================================================ */
function renderChord(data){
  /* 가로형 지판 — 기타 헤드(너트)가 왼쪽.
     · 가로선 = 6개의 줄 (아래 = 낮은 E, 위 = 높은 e / 타브와 동일한 방향)
     · 세로선 = 프렛, 왼쪽 굵은 선 = 너트
     · 너트 왼쪽 O/✕ = 개방현/뮤트, 격자 위 파란 dot = 운지(손가락 번호) */
  const W=380,H=200, padL=66, padR=24, padT=26, padB=34;
  const nStr=6, nFret=4;
  const gh=(H-padT-padB)/(nStr-1);        // 줄 간격(세로)
  const gw=(W-padL-padR)/nFret;           // 프렛 간격(가로)
  const sy=i=>padT+(nStr-1-i)*gh;         // i:0(낮은E)=맨 아래
  const fx=f=>padL+f*gw;
  const names=["E","A","D","G","B","e"];  // index 0 = 낮은 E
  let s=`<svg class="fretboard" viewBox="0 0 ${W} ${H}" role="img" aria-label="${data.name} chord diagram">`;
  // 너트(헤드 쪽 · 왼쪽 굵은 세로선)
  s+=`<line x1="${fx(0)}" y1="${sy(5)}" x2="${fx(0)}" y2="${sy(0)}" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>`;
  // 프렛(세로선) + 프렛 번호
  for(let f=1;f<=nFret;f++){
    s+=`<line x1="${fx(f)}" y1="${sy(5)}" x2="${fx(f)}" y2="${sy(0)}" stroke="currentColor" stroke-width="1.4" opacity=".28"/>`;
    s+=`<text x="${fx(f)-gw/2}" y="${H-8}" text-anchor="middle" font-size="11" font-weight="700" fill="currentColor" opacity=".45">${f}</text>`;
  }
  // 줄(가로선 · 낮은 줄일수록 두껍게) + 줄 이름 + O/✕ + 운지 dot
  data.strings.forEach((st,i)=>{
    const y=sy(i);
    s+=`<line x1="${fx(0)}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="currentColor" stroke-width="${(1.1+(5-i)*0.18).toFixed(2)}" opacity=".3"/>`;
    s+=`<text x="14" y="${y+4}" font-size="12" font-weight="700" fill="currentColor" opacity=".5">${names[i]}</text>`;
    if(st.state===0){ // 개방현 O
      s+=`<circle cx="${padL-24}" cy="${y}" r="6.5" fill="none" stroke="currentColor" stroke-width="1.8" opacity=".55"/>`;
    } else if(st.state==="x"){ // 뮤트 ✕
      s+=`<text x="${padL-24}" y="${y+5}" text-anchor="middle" font-size="14" font-weight="700" fill="currentColor" opacity=".5">✕</text>`;
    } else { // 운지
      const cx=fx(st.state-1)+gw/2;
      s+=`<circle cx="${cx}" cy="${y}" r="12" fill="var(--primary)"/>`;
      if(st.finger) s+=`<text x="${cx}" y="${y+4.5}" text-anchor="middle" font-size="12.5" font-weight="800" fill="#fff">${st.finger}</text>`;
    }
  });
  s+=`</svg>`;
  return s;
}

function renderTab(data){
  const W=560, padX=30, padTop=18, rowH=22, labelW=18;
  const H=padTop*2 + rowH*(data.strings-1);
  const names=["e","B","G","D","A","E"]; // line1..6
  const colW=(W-padX*2-labelW)/(data.cols);
  const lineY=i=>padTop+i*rowH;            // i:0(top,e) .. 5(E)
  const colX=c=>padX+labelW+colW*(c+0.5);
  let s=`<svg class="tabsvg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Tab notation">`;
  // 6줄 + 라벨
  for(let i=0;i<data.strings;i++){
    s+=`<line x1="${padX+labelW}" y1="${lineY(i)}" x2="${W-padX}" y2="${lineY(i)}" stroke="currentColor" stroke-width="1.2" opacity=".3"/>`;
    s+=`<text x="${padX}" y="${lineY(i)+4}" font-size="12" font-weight="700" fill="currentColor" opacity=".5">${names[i]}</text>`;
  }
  // 왼쪽 세로 마감선
  s+=`<line x1="${padX+labelW}" y1="${lineY(0)}" x2="${padX+labelW}" y2="${lineY(5)}" stroke="currentColor" stroke-width="1.6" opacity=".4"/>`;
  // 음표(프렛 숫자)
  data.notes.forEach(n=>{
    const i=n.s-1;                     // s:1(top e)..6(E)
    const cx=colX(n.c), cy=lineY(i);
    s+=`<circle cx="${cx}" cy="${cy}" r="10" fill="var(--bg)"/>`;
    s+=`<text x="${cx}" y="${cy+4.5}" text-anchor="middle" font-size="13" font-weight="800" fill="var(--primary)">${n.f}</text>`;
  });
  s+=`</svg>`;
  return s;
}

/* 일자 전체 목록 평탄화(이전/다음 이동용) */
function flatDays(){
  const out=[]; const c=CURRICULA[state.cur];
  c.months.forEach((m,mi)=> m.weeks.forEach((w,wi)=> w.days.forEach((d,di)=>{
    out.push({key:`${mi}-${wi}-${di}`, mi,wi,di, d, m, w});
  })));
  return out;
}
function totalDays(){ return flatDays().length; }
function doneCount(){ let n=0; flatDays().forEach(x=>{ if(state.done.has(x.key)) n++; }); return n; }

  const pct= total? Math.round(done/total*100):0;

  const tree=$("#monthTree"); tree.innerHTML="";
  c.months.forEach((m,mi)=>{
    const mDays = m.weeks.reduce((a,w)=>a+w.days.length,0);
    const mDone = m.weeks.reduce((a,w,wi)=>a+w.days.filter((_,di)=>state.done.has(`${mi}-${wi}-${di}`)).length,0);
    const isDone = mDays>0 && mDone===mDays;
    const el=document.createElement("div");
    el.className="month"+(m.soon?" soon":"")+(isDone?" done":"")+(mi===0?" open":"");
    const sub = m.soon ? t("months.soon") : (isDone? t("months.done") : `${mDone}/${mDays} ${t("curr.month.days")}`);
    let body="";
    m.weeks.forEach((w,wi)=>{
      const wDone=w.days.filter((_,di)=>state.done.has(`${mi}-${wi}-${di}`)).length;
      const wPct= Math.round(wDone/w.days.length*100);
      let days="";
      w.days.forEach((d,di)=>{
        const key=`${mi}-${wi}-${di}`, dn=state.done.has(key);
        days+=`<button class="day${dn?' done':''}" data-day="${key}">
          <span class="check"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="dt"><b>Day ${di+1}. ${d.title[state.lang]}</b><small>${d.sub[state.lang]}</small></span>
          <span class="arr"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </button>`;
      });
      body+=`<div class="week">
        <div class="week-label">${t("curr.week")} ${wi+1}
          <span class="pbar wp"><i style="width:${wPct}%"></i></span>
          <span style="color:var(--text-3);font-weight:700">${wPct}%</span>
        </div>${days}
      </div>`;
    });
    el.innerHTML=`
      <button class="month-head">
        <span class="month-num">${isDone?'✓':(mi+1)}</span>
        <span class="t"><b>${m.title[state.lang]}</b><small>${sub}</small></span>
        <span class="caret"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>
      <div class="month-body">${body}</div>`;
    el.querySelector(".month-head").onclick=()=>{ if(!m.soon) el.classList.toggle("open"); };
    el.querySelectorAll(".day").forEach(btn=>{
      btn.onclick=()=>{ state.dayKey=btn.dataset.day; go("lesson"); };

function renderLesson(){

  const item=list[idx]||list[0];
  const {mi,wi,di,d,m}=item;
  $("#lessonCrumb").textContent=`${m.title[state.lang]} · ${t("curr.week")} ${wi+1}`;
  $("#lessonTitle").textContent=`Day ${di+1}. ${d.title[state.lang]}`;
  $("#lessonSub").textContent=d.sub[state.lang];

  // 본문: 대표 샘플 재사용(모든 Day 동일 톤의 placeholder)
  $("#lessonProse").innerHTML = LESSON_BODY[state.lang].map(p=>`<p>${p}</p>`).join("");

  // SVG 렌더 마운트
  $("#fretMount").innerHTML = renderChord(CHORD_EM);
  $("#tabMount").innerHTML  = renderTab(TAB_EM_PENTA);

  // 완료 상태
  const done=state.done.has(item.key);
  $("#completeBtn").style.display=done?"none":"flex";
  $("#doneState").style.display=done?"flex":"none";
  $("#completeBtn").onclick=()=> completeDay(item.key);

  // 이전/다음
  $("#prevBtn").disabled = idx<=0;
  $("#nextBtn").disabled = idx>=list.length-1;
  $("#prevBtn").onclick=()=>{ if(idx>0){ state.dayKey=list[idx-1].key; renderLesson(); scrollTop(); } };
  $("#nextBtn").onclick=()=>{ if(idx<list.length-1){ state.dayKey=list[idx+1].key; renderLesson(); scrollTop(); maybeNudge(list[idx+1]); } };
}

function completeDay(key){
  state.done.add(key);
  store.set("riff_done", JSON.stringify([...state.done]));
  $("#completeBtn").style.display="none";
  $("#doneState").style.display="flex";
  burstConfetti();
  updateSaveAmount();
  // 주차 완료 시 도네이션 시트
  const item=flatDays().find(x=>x.key===key);
  const weekDays=CURRICULA[state.cur].months[item.mi].weeks[item.wi].days;
  const weekDone=weekDays.every((_,di)=>state.done.has(`${item.mi}-${item.wi}-${di}`));
  setTimeout(()=>{ if(weekDone) openSheet("donateScrim"); }, 900);
}

/* 컨페티(캔버스, 외부 의존 없음) */
const cvs=$("#confetti"), ctx=cvs.getContext("2d");
function fit(){ cvs.width=innerWidth; cvs.height=innerHeight; }
fit(); addEventListener("resize",fit);
let parts=[], raf=null;
function burstConfetti(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const colors=["#3182F6","#4593FC","#12B886","#FFC043","#FF6B6B","#C9E2FF"];
  const cx=innerWidth/2, cy=innerHeight*0.42;
  for(let i=0;i<120;i++){
    const a=Math.random()*Math.PI*2, sp=6+Math.random()*9;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,
      g:0.22+Math.random()*0.12, s:6+Math.random()*6, rot:Math.random()*6,
      vr:(Math.random()-.5)*0.4, c:colors[i%colors.length], life:1});
  }
  if(!raf) tick();
}
function tick(){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  parts.forEach(p=>{
    p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life-=0.008;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.globalAlpha=Math.max(p.life,0);
    ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore();
  });
  parts=parts.filter(p=>p.life>0 && p.y<cvs.height+40);
  if(parts.length){ raf=requestAnimationFrame(tick); } else { ctx.clearRect(0,0,cvs.width,cvs.height); raf=null; }
}

function toast(emoji, html, ms=4200){
  const wrap=$("#toastWrap");

  el.className="toast";
  el.innerHTML=`<span class="emoji">${emoji}</span><span class="txt">${html}</span>`;
  wrap.appendChild(el);

function updateSaveAmount(){

  const amt = doneCount()*per[state.lang];
  let str;
  if(state.lang==="kr"){
    // 만 원 단위로 어림해서 문장으로: "지금까지 약 48만 원 아꼈어요 ✌️"
    const man = Math.round(amt/10000);
    const money = man >= 1 ? `약 ${man.toLocaleString()}만 원` : `${amt.toLocaleString()}원`;
    str = `지금까지 <b>${money}</b> 아꼈어요 ✌️`;
  } else if(state.lang==="jp"){
    const man = amt/10000;
    const money = man >= 1 ? `約${(Math.round(man*10)/10).toLocaleString()}万円` : `¥${amt.toLocaleString()}`;
    str = `ここまで <b>${money}</b> 節約しました ✌️`;
  } else {
    str = `You've saved about <b>$${amt.toLocaleString()}</b> so far ✌️`;
  }
  $("#saveAmount").innerHTML = str;
}

/* ============================================================
   11. 라우팅 & 헤더
   ============================================================ */
function go(view){
  state.view=view;
  ["home","curriculum","lesson"].forEach(v=> $("#view-"+v).hidden = (v!==view));
  $("#backBtn").style.display = view==="home"?"none":"grid";
  $("#footerCta").style.display = "block";
  if(view==="home") renderHome();
  if(view==="curriculum") renderCurriculum();
  if(view==="lesson"){ renderLesson(); }
  scrollTop();
}
function back(){
  if(state.view==="lesson") go("curriculum");
  else if(state.view==="curriculum") go("home");
}
function scrollTop(){ window.scrollTo({top:0,behavior:"instant"}); }

/* ============================================================
   12. 바텀시트 열고 닫기
   ============================================================ */
function openSheet(id){ $("#"+id).classList.add("show"); }
function closeSheet(el){ el.classList.remove("show"); }
$$(".scrim").forEach(sc=>{
  sc.addEventListener("click",e=>{ if(e.target===sc) closeSheet(sc); });
});
$$("[data-close-sheet]").forEach(b=> b.onclick=()=> closeSheet(b.closest(".scrim")));

/* ============================================================
   13. 이벤트 바인딩
   ============================================================ */
// 언어
$("#langSeg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  state.lang=b.dataset.lang; store.set("riff_lang",state.lang);
  $$("#langSeg button").forEach(x=>x.classList.toggle("active",x===b));
  applyI18n(); go(state.view); updateSaveAmount();
});
// 테마
function applyTheme(){ document.documentElement.dataset.theme=state.theme; }
$("#themeBtn").onclick=()=>{ state.theme=state.theme==="light"?"dark":"light"; store.set("riff_theme",state.theme); applyTheme(); };
// 뒤로 / 로고 홈
$("#backBtn").onclick=back;
$("#brandHome").onclick=()=>go("home");
// 닉네임
$("#nickChip").onclick=()=> openSheet("nickScrim");
$("#saveNickBtn").onclick=()=>{
  const v=$("#nickInput").value.trim();
  if(v){ state.nick=v; store.set("riff_nick",v); refreshNick(); closeSheet($("#nickScrim")); }
};
function refreshNick(){
  if(state.nick){ $("#nickChip").style.display="inline-flex"; $("#nickText").textContent=state.nick; }
}
// 도네이션 / 저장 진입
$("#openDonateBtn").onclick=()=>{ updateSaveAmount(); openSheet("donateScrim"); };
$("#openStorageBtn").onclick=()=> openSheet("storageScrim");
// export / import
$("#exportBtn").onclick=()=>{
  const payload=JSON.stringify({nick:state.nick, done:[...state.done], v:1});
  $("#ioText").value=btoa(unescape(encodeURIComponent(payload)));
  $("#ioText").select();
};
$("#importBtn").onclick=()=>{
  try{
    const raw=decodeURIComponent(escape(atob($("#ioText").value.trim())));
    const obj=JSON.parse(raw);
    if(obj.done){ state.done=new Set(obj.done); store.set("riff_done",JSON.stringify(obj.done)); }
    if(obj.nick){ state.nick=obj.nick; store.set("riff_nick",obj.nick); refreshNick(); }
    closeSheet($("#storageScrim")); go(state.view);
    toast("✅", state.lang==="kr"?"진도를 불러왔어요!":state.lang==="jp"?"進捗を読み込みました！":"Progress restored!");
  }catch(e){
    toast("⚠️", state.lang==="kr"?"코드를 다시 확인해주세요.":state.lang==="jp"?"コードを確認してください。":"Please check the code.");
  }
};
// 헤더 그림자
addEventListener("scroll",()=>{ $("#topbar").classList.toggle("scrolled", window.scrollY>4); });

/* ============================================================
   14. 부트
   ============================================================ */
applyTheme();
applyI18n();
$$("#langSeg button").forEach(x=> x.classList.toggle("active", x.dataset.lang===state.lang));
refreshNick();
renderHome();
go("home");
// 닉네임 미설정 시 살짝 뒤 유도(강제 아님)
if(!state.nick){ setTimeout(()=> openSheet("nickScrim"), 1200); }
</script>
</body>
</html>
